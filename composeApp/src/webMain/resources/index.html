<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alex Castillo | Android Developer</title>

    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;909&display=swap" rel="stylesheet">

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        html {
            font-size: 62.5%; /* 1rem = 10px base */
            overflow-x: hidden;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        #ComposeTarget {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        /* RESPONSIVE FONT SIZES - IGUAL QUE EL ORIGINAL */
        @media (max-width: 1200px) {
            html {
                font-size: 55%; /* 10% más pequeño */
            }
        }

        @media (max-width: 450px) {
            html {
                font-size: 50%; /* 20% más pequeño */
            }
        }
    </style>
</head>
<body>
<canvas id="ComposeTarget"></canvas>
<script src="composeApp.js"></script>
</body>
</html>
